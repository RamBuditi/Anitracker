<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>My Anime Tracker</h1>
        <input type="text" id="search-box" placeholder="Search for anime...">
        <button id="search-button">Search</button>
    </header>

    <main>
        <section id="search-results">
            <h2>Search Results</h2>
            <div class="anime-list" id="search-results-list">
                </div>
        </section>

        <section id="my-list">
            <h2>My Anime List</h2>
            <div class="anime-list" id="my-anime-list">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
